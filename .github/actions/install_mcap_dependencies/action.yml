name: install_mcap_dependencies
description: Install and setup lz4 and zstd
# TODO add this to eProsima-CI

inputs:

  cmake_build_type:
    description: Specify the build type on single-configuration generators
    required: true
    default: Release

runs:
  using: composite
  steps:

    # LINUX
    - name: Install in ubuntu
      uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
      if: runner.os == 'Linux'
      with:
        packages: liblz4-dev libzstd-dev

    # WINDOWS
    - name: Download vcpkg
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        git clone https://github.com/Microsoft/vcpkg.git ${{ github.workspace }}\vcpkg

    - name: Prepare vcpkg GitHub cache environment
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $gha_cache_url = $env:ACTIONS_CACHE_URL
        if ([string]::IsNullOrWhiteSpace($gha_cache_url) -and -not [string]::IsNullOrWhiteSpace($env:ACTIONS_RESULTS_URL)) {
          $gha_cache_url = $env:ACTIONS_RESULTS_URL
          "ACTIONS_CACHE_URL=$gha_cache_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }

        if ([string]::IsNullOrWhiteSpace($env:ACTIONS_RUNTIME_TOKEN) -or [string]::IsNullOrWhiteSpace($gha_cache_url)) {
          "VCPKG_BINARY_SOURCES=clear" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host 'GitHub Actions cache variables are unavailable for vcpkg. Falling back to local binary caching.'
        }

    - name: Install vcpkg
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: '6f29f12e82a8293156836ad81cc9bf5af41fe836'

    - name: Install lz4 and zstd
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        vcpkg install lz4 zstd --triplet x64-windows --vcpkg-root ${{ env.VCPKG_ROOT }}
        "vcpkg_install_path=${{ github.workspace }}\vcpkg\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append
        if ("${{ inputs.cmake_build_type }}" -eq "Release") {
          "${{ github.workspace }}\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        } else {
          "${{ github.workspace }}\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ github.workspace }}\vcpkg\installed\x64-windows\debug\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }
