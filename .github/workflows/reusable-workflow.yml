# Reusable workflow to run the following jobs:
#
#   - multiplatform-tests
#     - [ Debug | Release ]
#     - execute tests in different versions of ubuntu with different build types
#

name: reusable-workflow

on:

  workflow_call:
    inputs:

      custom_version_build:
        description: >
          Version of Fast DDS build from eProsima-CI.
        required: true
        type: string

      dependencies_artifact_postfix:
        description: >
          Postfix name to add to artifact name to download dependencies.
          This is use to download a specific artifact version from eProsima-CI.
        required: true
        default: '_nightly'
        type: string

      ref:
        description: >
          The branch or tag name to checkout.
        required: true
        type: string
        default: 'main'

      os:
        description: 'Specify runs-on machine to download specific artifact'
        required: true
        type: string


env:
  # TODO: controller is not tested as it has no tests
  code_packages_names: 'ddsrecorder_participants ddsrecorder_yaml ddsrecorder_tool ddsreplayer_tool'
  docs_packages_names: 'ddsrecorder_docs'

jobs:

#####################################################################
# TEST

  multiplatform-tests:
    name: ${{ inputs.os }}-ci-${{ matrix.cmake_build_type }}
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        cmake_build_type:
          - Release
          - Debug
    steps:

      - name: Sync repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src
          ref: ${{ inputs.ref }}

      - name: Download dependencies and install requirements
        uses: ./src/.github/actions/project_dependencies
        with:
          os: ${{ inputs.os }}
          cmake_build_type: ${{ matrix.cmake_build_type }}
          custom_version_build: ${{ inputs.custom_version_build }}
          dependencies_artifact_postfix: ${{ inputs.dependencies_artifact_postfix }}
          secret_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Windows colcon and VS fallback
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $shim_dir = Join-Path $env:RUNNER_TEMP 'colcon-shim'
          New-Item -Path $shim_dir -ItemType Directory -Force | Out-Null

          $python_exe = (Get-Command python).Source
          "@echo off`n`"$python_exe`" -m colcon %*" | Set-Content -Path (Join-Path $shim_dir 'colcon.cmd') -Encoding ascii
          $shim_dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $tool_dirs = @()
          foreach ($tool in @('cmake', 'ninja', 'git')) {
            $tool_cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($null -ne $tool_cmd) {
              $tool_dirs += (Split-Path $tool_cmd.Source -Parent)
            }
          }

          $path_candidates = @(
            "$env:WINDIR\System32",
            "$env:WINDIR",
            "$env:WINDIR\System32\Wbem",
            "$env:WINDIR\System32\WindowsPowerShell\v1.0",
            "$env:WINDIR\System32\OpenSSH",
            $shim_dir
          ) + $tool_dirs
          if (-not [string]::IsNullOrWhiteSpace($env:vcpkg_install_path)) {
            $path_candidates += (Join-Path $env:vcpkg_install_path 'bin')
            $vcpkg_debug_bin = Join-Path $env:vcpkg_install_path 'debug\bin'
            if (Test-Path $vcpkg_debug_bin) {
              $path_candidates += $vcpkg_debug_bin
            }
          }
          if (-not [string]::IsNullOrWhiteSpace($env:RUNVCPKG_VCPKG_ROOT)) {
            $path_candidates += $env:RUNVCPKG_VCPKG_ROOT
          }

          $compact_paths = $path_candidates |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            ForEach-Object { $_.Trim() } |
            Select-Object -Unique
          "__VSCMD_PREINIT_PATH=$($compact_paths -join ';')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if (-not [string]::IsNullOrWhiteSpace($env:RUNVCPKG_VCPKG_ROOT)) {
            "VCPKG_ROOT=$env:RUNVCPKG_VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          $vs_version = $env:VisualStudioVersion
          if ([string]::IsNullOrWhiteSpace($vs_version)) {
            $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
            if (Test-Path $vswhere) {
              $installation_version = & $vswhere -latest -products * -property installationVersion
              if (-not [string]::IsNullOrWhiteSpace($installation_version)) {
                $major_version = ($installation_version.Trim().Split('.'))[0]
                if ($major_version -match '^\d+$') {
                  $vs_version = "$major_version.0"
                }
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($vs_version)) {
            throw 'Unable to determine VisualStudioVersion from environment or vswhere.'
          }
          "VisualStudioVersion=$vs_version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile and run tests
        id: compile_and_test
        uses: eProsima/eProsima-CI/multiplatform/colcon_build_test@v0
        with:
          packages_names: ${{ env.code_packages_names }}
          cmake_args: -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=${{ matrix.cmake_build_type }}
          workspace_dependencies: './install'
          ctest_args: --label-exclude "xfail"
          colcon_meta_file: ./src/.github/workflows/configurations/${{ runner.os }}/colcon.meta
          test_report_artifact: test_report${{ inputs.dependencies_artifact_postfix }}_${{ inputs.custom_version_build }}_${{ inputs.os }}_${{ matrix.cmake_build_type }}

      - name: Test Report
        uses: eProsima/eProsima-CI/external/test-reporter@v0
        if: success() || failure()
        with:
          name: "Report: ${{ inputs.os }} | ${{ matrix.cmake_build_type }} "
          path: "${{ steps.compile_and_test.outputs.ctest_results_path }}*.xml"
          working-directory: 'src'
          path-replace-backslashes: 'true'
          list-tests: 'failed'
          list-suites: 'failed'
